<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Keuangan Perantauan - Cloud Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { fontSize: { 'base': '1.125rem' } } }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .active-tab { border-bottom: 4px solid #3b82f6; color: #3b82f6; font-weight: 800; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 min-h-screen pb-20">

    <header class="bg-white dark:bg-slate-800 border-b dark:border-slate-700 sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4 h-16 flex items-center justify-between">
            <h1 class="font-black text-xl tracking-tight">ATUR<span class="text-blue-600">WANG</span></h1>
            <div class="flex items-center gap-3">
                <select id="currentUser" onchange="switchUser()" class="bg-slate-100 dark:bg-slate-700 border-none rounded-lg text-sm font-bold px-2 py-1">
                    <option value="Nathan">Nathan</option>
                    <option value="Michelle">Michelle</option>
                </select>
                <button onclick="toggleDarkMode()" class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-700">
                    <span id="sunIcon" class="hidden">☀️</span>
                    <span id="moonIcon">🌙</span>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4 space-y-6">
        <section id="wealth-section" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="bg-blue-600 p-6 rounded-3xl text-white shadow-xl shadow-blue-200 dark:shadow-none">
                <p class="text-sm opacity-80 font-bold uppercase tracking-widest">Total Wealth (<span id="userLabel">Nathan</span>)</p>
                <h2 id="totalWealthDisplay" class="text-4xl font-black mt-2">Rp 0</h2>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div class="bg-white dark:bg-slate-800 p-4 rounded-2xl border dark:border-slate-700">
                    <p class="text-[10px] text-slate-500 font-bold uppercase">ATM/Bank</p>
                    <p id="atmWealth" class="font-black text-sm">Rp 0</p>
                </div>
                <div class="bg-white dark:bg-slate-800 p-4 rounded-2xl border dark:border-slate-700">
                    <p class="text-[10px] text-slate-500 font-bold uppercase">Investasi</p>
                    <p id="invWealth" class="font-black text-sm">Rp 0</p>
                </div>
                <div class="bg-white dark:bg-slate-800 p-4 rounded-2xl border dark:border-slate-700">
                    <p class="text-[10px] text-slate-500 font-bold uppercase">Cash</p>
                    <p id="cashWealth" class="font-black text-sm">Rp 0</p>
                </div>
                <div class="bg-white dark:bg-slate-800 p-4 rounded-2xl border dark:border-slate-700">
                    <p class="text-[10px] text-slate-500 font-bold uppercase">Lainnya</p>
                    <p id="otherWealth" class="font-black text-sm">Rp 0</p>
                </div>
            </div>
        </section>

        <div id="tabList" class="flex border-b dark:border-slate-700 overflow-x-auto">
            <button onclick="openTab(event, 'dashboard')" class="px-6 py-3 active-tab whitespace-nowrap">Dashboard</button>
            <button onclick="openTab(event, 'input-data')" class="px-6 py-3 whitespace-nowrap">Input</button>
            <button onclick="openTab(event, 'history')" class="px-6 py-3 whitespace-nowrap">Riwayat</button>
            <button onclick="openTab(event, 'settings')" class="px-6 py-3 whitespace-nowrap">Set Saldo</button>
        </div>

        <div id="dashboard" class="tab-content active space-y-4">
            <div class="flex items-center justify-between mt-4">
                <h3 class="font-bold">Ringkasan Filter</h3>
                <select id="filterMonth" onchange="renderAll()" class="text-xs bg-white dark:bg-slate-800 border p-1 rounded font-bold"></select>
            </div>
            <div class="grid grid-cols-3 gap-3">
                <div class="bg-emerald-50 dark:bg-emerald-900/20 p-4 rounded-2xl border border-emerald-100 dark:border-emerald-800">
                    <p class="text-[9px] text-emerald-600 font-black uppercase">Pemasukkan</p>
                    <p id="totalIncomeDisplay" class="text-sm font-black text-emerald-700 dark:text-emerald-400">Rp 0</p>
                </div>
                <div class="bg-rose-50 dark:bg-rose-900/20 p-4 rounded-2xl border border-rose-100 dark:border-rose-800">
                    <p class="text-[9px] text-rose-600 font-black uppercase">Pengeluaran</p>
                    <p id="totalExpenseDisplay" class="text-sm font-black text-rose-700 dark:text-rose-400">Rp 0</p>
                </div>
                <div class="bg-slate-100 dark:bg-slate-800 p-4 rounded-2xl border dark:border-slate-700">
                    <p class="text-[9px] text-slate-500 font-black uppercase">Net Saldo</p>
                    <p id="netSaldoDisplay" class="text-sm font-black">Rp 0</p>
                </div>
            </div>
        </div>

        <div id="input-data" class="tab-content">
            <div class="bg-white dark:bg-slate-800 p-6 rounded-3xl border dark:border-slate-700 space-y-4">
                <h3 id="formTitle" class="font-black text-lg">Input Transaksi</h3>
                <input type="hidden" id="editId">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-black text-slate-500 uppercase mb-1">Tanggal</label>
                        <input type="date" id="inputDate" class="w-full bg-slate-50 dark:bg-slate-700 p-3 rounded-xl border-none font-bold">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-500 uppercase mb-1">Nominal</label>
                        <input type="number" id="inputValue" placeholder="Rp" class="w-full bg-slate-50 dark:bg-slate-700 p-3 rounded-xl border-none font-bold">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-black text-slate-500 uppercase mb-1">Kategori Utama</label>
                        <select id="mainCat" onchange="handleMainCatChange()" class="w-full bg-slate-50 dark:bg-slate-700 p-3 rounded-xl border-none font-bold">
                            <option value="Pemasukkan">Pemasukkan</option>
                            <option value="Pengeluaran Tetap">Pengeluaran Tetap</option>
                            <option value="Pengeluaran Variabel">Pengeluaran Variabel</option>
                            <option value="Pengeluaran Lain">Pengeluaran Lain</option>
                            <option value="Tabungan/Investasi">Tabungan/Investasi</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-500 uppercase mb-1">Sub Kategori</label>
                        <select id="subCat" class="w-full bg-slate-50 dark:bg-slate-700 p-3 rounded-xl border-none font-bold"></select>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-black text-slate-500 uppercase mb-1">Sumber Dana</label>
                        <select id="source" class="w-full bg-slate-50 dark:bg-slate-700 p-3 rounded-xl border-none font-bold">
                            <option value="atm">ATM/Bank</option>
                            <option value="inv">Investasi</option>
                            <option value="cash">Cash</option>
                            <option value="other">Lainnya</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-500 uppercase mb-1">Tipe</label>
                        <select id="inputType" class="w-full bg-slate-50 dark:bg-slate-700 p-3 rounded-xl border-none font-bold">
                            <option value="Pribadi">Pribadi</option>
                            <option value="Bersama">Bersama</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] font-black text-slate-500 uppercase mb-1">Keterangan</label>
                    <input type="text" id="inputDesc" placeholder="..." class="w-full bg-slate-50 dark:bg-slate-700 p-3 rounded-xl border-none font-bold">
                </div>
                <button onclick="saveEntry()" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-black shadow-lg shadow-blue-200 dark:shadow-none active:scale-95 transition-all">SIMPAN TRANSAKSI</button>
                <button id="cancelBtn" onclick="cancelEdit()" class="w-full bg-slate-200 dark:bg-slate-700 text-slate-600 dark:text-slate-300 p-4 rounded-2xl font-black hidden">BATAL</button>
            </div>
        </div>

        <div id="history" class="tab-content overflow-x-auto">
            <table class="w-full text-left bg-white dark:bg-slate-800 rounded-3xl overflow-hidden border dark:border-slate-700">
                <thead class="bg-slate-50 dark:bg-slate-700/50 text-[10px] font-black text-slate-500 uppercase">
                    <tr>
                        <th class="p-4">Tgl</th>
                        <th class="p-4">Info</th>
                        <th class="p-4 text-right">Nilai</th>
                        <th class="p-4 text-center">Aksi</th>
                    </tr>
                </thead>
                <tbody id="transactionBody" class="divide-y dark:divide-slate-700"></tbody>
            </table>
        </div>

        <div id="settings" class="tab-content">
            <div class="bg-white dark:bg-slate-800 p-6 rounded-3xl border dark:border-slate-700 space-y-4">
                <h3 class="font-black text-lg">Set Saldo Awal</h3>
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="initAtm" placeholder="ATM" class="bg-slate-50 dark:bg-slate-700 p-3 rounded-xl border-none font-bold">
                    <input type="number" id="initInv" placeholder="Investasi" class="bg-slate-50 dark:bg-slate-700 p-3 rounded-xl border-none font-bold">
                    <input type="number" id="initCash" placeholder="Cash" class="bg-slate-50 dark:bg-slate-700 p-3 rounded-xl border-none font-bold">
                    <input type="number" id="initOther" placeholder="Lainnya" class="bg-slate-50 dark:bg-slate-700 p-3 rounded-xl border-none font-bold">
                </div>
                <button onclick="saveMultiBalances()" class="w-full bg-slate-800 dark:bg-blue-700 text-white p-4 rounded-2xl font-black">UPDATE SALDO</button>
            </div>
        </div>
    </main>

    <script>
        const categories = {
            "Pemasukkan": ["Gaji", "Bonus/Insentif", "Penghasilan Lain"],
            "Pengeluaran Tetap": ["Kos", "Token Listrik", "Paket Data/WiFi", "Langganan", "Asuransi/BPJS"],
            "Pengeluaran Variabel": ["Bahan Makanan", "Makan di Luar", "Transportasi", "Keperluan Rumah", "Hiburan", "Kesehatan", "Laundry", "Skincare"],
            "Pengeluaran Lain": ["Bayar Utang", "Kirim ke Rumah", "Lainnya"],
            "Tabungan/Investasi": ["Tabungan", "Investasi", "Dana Darurat"]
        };

        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyx3F3CWOt91cu5PY2r830BQON4wOnyyA7RNZoErqEjsXFxxZmsJ65xcT-9s2ixjgI4/exec";
        let currentActiveUser = "Nathan";

        // CORE SYNC
        async function getAllData() {
            try {
                const r = await fetch(WEB_APP_URL);
                const d = await r.json();
                localStorage.setItem('financeData_V10', JSON.stringify(d));
                return d || [];
            } catch (e) {
                return JSON.parse(localStorage.getItem('financeData_V10')) || [];
            }
        }

        async function saveAllData(d) {
            localStorage.setItem('financeData_V10', JSON.stringify(d));
            try {
                await fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(d) });
            } catch (e) { console.error("Cloud Error"); }
        }

        // LOGIC
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            document.getElementById('sunIcon').classList.toggle('hidden', !isDark);
            document.getElementById('moonIcon').classList.toggle('hidden', isDark);
        }

        function handleMainCatChange() {
            const m = document.getElementById('mainCat').value;
            const s = document.getElementById('subCat');
            s.innerHTML = categories[m].map(c => `<option value="${c}">${c}</option>`).join('');
        }

        function getMultiBalances() {
            return JSON.parse(localStorage.getItem('financeMultiBalances_V10')) || {
                Nathan: { atm: 0, inv: 0, cash: 0, other: 0 },
                Michelle: { atm: 0, inv: 0, cash: 0, other: 0 }
            };
        }

        function saveMultiBalances() {
            let b = getMultiBalances();
            b[currentActiveUser] = {
                atm: parseFloat(document.getElementById('initAtm').value) || 0,
                inv: parseFloat(document.getElementById('initInv').value) || 0,
                cash: parseFloat(document.getElementById('initCash').value) || 0,
                other: parseFloat(document.getElementById('initOther').value) || 0
            };
            localStorage.setItem('financeMultiBalances_V10', JSON.stringify(b));
            renderAll();
            alert("Saldo diperbarui!");
        }

        async function saveEntry() {
            const val = document.getElementById('inputValue').value;
            const date = document.getElementById('inputDate').value;
            if(!val || !date) return;

            let d = await getAllData();
            const entry = {
                id: Date.now(),
                user: currentActiveUser,
                date: date,
                mainCat: document.getElementById('mainCat').value,
                subCat: document.getElementById('subCat').value,
                source: document.getElementById('source').value,
                value: parseFloat(val),
                desc: document.getElementById('inputDesc').value,
                type: document.getElementById('inputType').value
            };

            d.push(entry);
            await saveAllData(d);
            document.getElementById('inputValue').value = "";
            document.getElementById('inputDesc').value = "";
            await renderAll();
            openTab({currentTarget: document.querySelectorAll('#tabList button')[0]}, 'dashboard');
        }

        async function renderAll() {
            const d = await getAllData();
            const b = getMultiBalances()[currentActiveUser];
            const filterM = document.getElementById('filterMonth').value || 'all';
            
            let cur = { ...b };
            let dash = { inc: 0, exp: 0 };

            d.forEach(i => {
                if(i.user === currentActiveUser) {
                    if(i.mainCat === 'Pemasukkan') {
                        cur[i.source] += i.value;
                        if(filterM === 'all' || i.date.startsWith(filterM)) dash.inc += i.value;
                    } else {
                        cur[i.source] -= i.value;
                        if(filterM === 'all' || i.date.startsWith(filterM)) dash.exp += i.value;
                    }
                }
            });

            // Update UI
            const fmt = n => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(n);
            document.getElementById('totalWealthDisplay').innerText = fmt(Object.values(cur).reduce((x, y) => x + y, 0));
            document.getElementById('atmWealth').innerText = fmt(cur.atm);
            document.getElementById('invWealth').innerText = fmt(cur.inv);
            document.getElementById('cashWealth').innerText = fmt(cur.cash);
            document.getElementById('otherWealth').innerText = fmt(cur.other);
            document.getElementById('totalIncomeDisplay').innerText = fmt(dash.inc);
            document.getElementById('totalExpenseDisplay').innerText = fmt(dash.exp);
            document.getElementById('netSaldoDisplay').innerText = fmt(dash.inc - dash.exp);

            // History
            document.getElementById('transactionBody').innerHTML = d.filter(i => i.user === currentActiveUser)
                .sort((x, y) => y.id - x.id).slice(0, 20).map(i => `
                <tr class="text-xs">
                    <td class="p-4 font-bold">${i.date.split('-')[2]}/${i.date.split('-')[1]}</td>
                    <td class="p-4">
                        <div class="font-bold">${i.subCat}</div>
                        <div class="opacity-50 text-[9px] uppercase">${i.source}</div>
                    </td>
                    <td class="p-4 text-right font-black ${i.mainCat==='Pemasukkan'?'text-emerald-600':'text-rose-600'}">${fmt(i.value)}</td>
                    <td class="p-4 text-center">
                        <button onclick="deleteEntry(${i.id})" class="text-rose-500">✕</button>
                    </td>
                </tr>`).join('');
        }

        async function deleteEntry(id) {
            if(confirm("Hapus?")) {
                let d = await getAllData();
                await saveAllData(d.filter(i => i.id !== id));
                await renderAll();
            }
        }

        async function updateMonthFilterOptions() {
            const d = await getAllData();
            const f = document.getElementById('filterMonth');
            const months = [...new Set(d.map(i => i.date.substring(0, 7)))].sort().reverse();
            f.innerHTML = '<option value="all">Semua Waktu</option>' + months.map(m => `<option value="${m}">${m}</option>`).join('');
        }

        function switchUser() {
            currentActiveUser = document.getElementById('currentUser').value;
            document.getElementById('userLabel').innerText = currentActiveUser;
            const b = getMultiBalances()[currentActiveUser];
            document.getElementById('initAtm').value = b.atm;
            document.getElementById('initInv').value = b.inv;
            document.getElementById('initCash').value = b.cash;
            document.getElementById('initOther').value = b.other;
            renderAll();
        }

        function openTab(e, n) {
            document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
            document.querySelectorAll("#tabList button").forEach(b => b.classList.remove("active-tab"));
            document.getElementById(n).classList.add("active");
            e.currentTarget.classList.add("active-tab");
        }

        // INIT
        (async () => {
            if (localStorage.getItem('theme') === 'dark') toggleDarkMode();
            document.getElementById('inputDate').valueAsDate = new Date();
            handleMainCatChange();
            await updateMonthFilterOptions();
            await renderAll();
        })();
    </script>
</body>
</html>
